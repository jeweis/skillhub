<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="description"
    content="Skill Hub helps you discover, preview, download, and publish Claude Agent Skills."
  >

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Skill Hub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Skill Hub</title>
  <link rel="manifest" href="manifest.json">

  <script
    type="text/javascript"
    src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.26.js"
  ></script>
</head>
<body>
  <script>
    (function () {
      function isFeishuRuntime() {
        if (!window.tt) {
          return false;
        }
        return (
          typeof window.tt.requestAccess === "function" ||
          typeof window.tt.requestAuthCode === "function"
        );
      }

      function waitForRuntimeReady() {
        return new Promise(function (resolve, reject) {
          if (!isFeishuRuntime()) {
            reject(new Error("not_feishu_runtime"));
            return;
          }

          if (window.h5sdk && typeof window.h5sdk.ready === "function") {
            window.h5sdk.ready(function () {
              resolve(window.tt);
            });
            return;
          }

          resolve(window.tt);
        });
      }

      function callRequestAuthCode(tt, appId) {
        return new Promise(function (resolve, reject) {
          tt.requestAuthCode({
            appId: appId,
            success: function (res) {
              if (res && res.code) {
                resolve(res.code);
                return;
              }
              reject(new Error("auth_code_missing"));
            },
            fail: function (err) {
              reject(
                new Error(
                  "request_auth_code_failed:" +
                    JSON.stringify(err || {})
                )
              );
            },
          });
        });
      }

      function getAuthCode(appId) {
        return waitForRuntimeReady().then(function (tt) {
          return new Promise(function (resolve, reject) {
            if (tt.requestAccess) {
              tt.requestAccess({
                appID: appId,
                scopeList: [],
                success: function (res) {
                  if (res && res.code) {
                    resolve(res.code);
                    return;
                  }
                  reject(new Error("auth_code_missing"));
                },
                fail: function (err) {
                  if (err && err.errno === 103) {
                    callRequestAuthCode(tt, appId)
                      .then(resolve)
                      .catch(reject);
                    return;
                  }
                  reject(
                    new Error(
                      "request_access_failed:" +
                        JSON.stringify(err || {})
                    )
                  );
                },
              });
              return;
            }
            callRequestAuthCode(tt, appId).then(resolve).catch(reject);
          });
        });
      }

      window.skillHubFeishuAuth = {
        isFeishuRuntime: isFeishuRuntime,
        getAuthCode: getAuthCode,
      };
    })();
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
